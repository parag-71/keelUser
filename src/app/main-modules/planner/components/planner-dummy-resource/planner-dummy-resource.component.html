<div class="popupParent">
  <h4 mat-dialog-title class="modal-header text-center">
    <span class="header_text"> {{data.type}} Resource </span>
    <mat-icon class="close" matTooltip="close" (click)="closeDialog()">close</mat-icon>
  </h4>
  <form [formGroup]="resourceForm" >
  <div class="container">
    <div class="row inpu_field_box">
      <div class="col-md-6 col-xs-12">
        <mat-form-field appearance="outline">
          <mat-label>First Name</mat-label>
          <input matInput formControlName="usrFirstname"/>
          <mat-error *ngIf="resourceForm.get('usrFirstname')?.touched && resourceForm.get('usrFirstname')?.invalid">
            First Name is required.
          </mat-error>
        </mat-form-field>
      </div>
      <div class="col-md-6 col-xs-12">
        <mat-form-field appearance="outline">
          <mat-label>Last Name</mat-label>
          <input matInput formControlName="usrLastname"/>
          <mat-error *ngIf="resourceForm.get('usrLastname')?.touched && resourceForm.get('usrLastname')?.invalid">
            Last Name is required.
          </mat-error>
        </mat-form-field>
      </div>
      <div class="col-md-6 col-xs-12">
        <mat-form-field appearance="outline" class="matSelectPadding">
            <mat-label>Role</mat-label>
            <mat-select formControlName="roleId">
              <mat-option *ngFor="let role of resourceService.roleList" [value]="role.roleId">
                {{role.roleName}}
              </mat-option>
            </mat-select>
            <mat-error *ngIf="resourceForm.get('roleId')?.touched && resourceForm.get('roleId')?.invalid">
              Role is required.
            </mat-error>
          </mat-form-field>
      </div>
      <div class="col-md-6 col-xs-12">
        <mat-form-field appearance="outline">
          <mat-label>Description</mat-label>
          <input matInput formControlName="usrDescription"/>
        </mat-form-field>
      </div>
    </div>
  </div>
</form>
  <div class="position-sticky col-md-12 col-xs-12 pb-2 add_btn_box py-2" [ngClass]="{ 'd-flex justify-content-between': this.data.Id, 'justify-content-end': !this.data.Id }">
    <button *ngIf="this.data.Id" type="button" class="del_btn" style="margin-right: 12px;" (click)="deleteDummyResource()">Delete</button>
    <div>
        <button class="add_btn" (click)="submitForm()">{{this.data.type}}</button>
        <button type="button" class="cancel_btn me-2" (click)="closeDialog()">Cancel</button>
    </div>
  
</div>
</div>
