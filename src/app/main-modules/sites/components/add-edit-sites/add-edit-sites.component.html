 <div class="popupParent">
    <h4 mat-dialog-title class="modal-header text-center">
        <span class="header_text">
             {{this.from == 'edit' ? 'Update' : 'Add New'}}
        </span>
        <mat-icon class="close" matTooltip="close" (click)="closeDialog()" matDialogClose>close</mat-icon>
    </h4>
    <form>
        <div class="container"> 
            <form [formGroup]="addUpdateSiteGrp" (ngSubmit)="addUpdateSiteGrp.valid ? addUpdateSite(addUpdateSiteGrp.getRawValue()) : commonService.markFormGroupTouched(addUpdateSiteGrp)" class="row inpu_field_box">
                <div class="col-12">
                    <div class="p-0">
                        <mat-form-field appearance="outline">
                            <mat-label>Site Name</mat-label>
                            <input matInput formControlName="siteName">
                            <mat-error *ngIf="(addUpdateSiteGrp.get('siteName').invalid && addUpdateSiteGrp.get('siteName').touched)">{{getErrorMessage('siteName')}}</mat-error>
                        </mat-form-field>
                    </div>
                </div>
                <div class="col-12">
                        <mat-form-field appearance="outline" class="siteLeaderPad">
                            <mat-label>Site Leader</mat-label>
                            <mat-select formControlName="siteLeader">
                                <mat-option *ngFor="let user of userList" [value]="user.usrId">
                                    {{user.usrFirstname}} {{user.usrLastname}}
                                </mat-option>
                            </mat-select>
                            <mat-error *ngIf="(addUpdateSiteGrp.get('siteLeader').invalid && addUpdateSiteGrp.get('siteLeader').touched)">{{getErrorMessage('siteLeader')}}</mat-error>
                        </mat-form-field>
                </div>
                <div class="col-12 add_btn_box">
                    <button type="button" class="cancel_btn" (click)="closeDialog()">Cancel</button>
                    <button type="submit" class="add_btn">{{this.from == 'edit' ? 'Update' : 'Add New'}}</button>
                </div>
            </form>
        </div>
    </form>
<div>
