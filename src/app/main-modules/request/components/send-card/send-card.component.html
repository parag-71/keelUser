
<div class="cardBox">
  <mat-card class="card" *ngFor="let user of requestService.sendList">
    <div class="userImg">
        <img class="img-fluid"  mat-card-image [ngClass]="{'backColor': !user?.imageUrl}" [src]="user?.imageUrl ?  baseUrl+user?.imageUrl : 'assets/images/User02.png'" alt="Photo of a Shiba Inu"> 
    </div>
    <mat-card-content class="mat_card_content">
    <div class="container">
      <div class="row">
      <div class="username col-12">{{user.usrFirstname}} {{user.usrLastname}}</div>
      <div class="company col-12">
        <span><img class="company-icon" src="assets/images/company-icon.png" alt=""></span>
        <span class="comapnyName">{{user.compName}} </span>
      </div>
      <div class="company col-12">
        <span><img class="company-icon " src="assets/images/user-icon.png" alt=""></span>
        <span class="comapnyName">{{user.roleName}}</span>
      </div>
      <div class="col-12 location_section">
        <div>
            <div class="from">From</div>
            <div class="location">{{user.fromSiteName}}</div>
        </div>
        <div>
            <img src="assets/images/Left Arrow.png" alt="">
        </div>
        <div>
            <div class="from">To</div>
            <div class="location">{{user.toSiteName}}</div>
        </div>
      </div>
      <div class="col-12">
        <div class="requestDate">Request {{requestType == 0 ? 'sent' : 'received'}}: {{user.suCreatedate | date: 'dd/MM/yyyy'}} </div>
      </div>
    </div>
    </div>
    </mat-card-content>
    <mat-card-actions *ngIf="requestType == 0"  class="matCardAction">
      <button class="add_btn" (click)="withdrawReq(user.suId)">Withdraw request</button>
    </mat-card-actions>
    <mat-card-actions *ngIf="requestType == 1"  class="matCardAction">
      <button class="accBtn" (click)="acceptReqest(user)" >Accept</button>
      <button class="RejBtn" (click)="withdrawReq(user.suId)">Reject</button>
    </mat-card-actions>
  </mat-card>
</div>
